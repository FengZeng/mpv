name: Build libmpv

on:
  pull_request:
  push:
    branches: [main, vcpkg]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: libmpv-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-build:
    name: Build libmpv (macos-15 / ${{ matrix.arch }})
    runs-on: macos-15
    env:
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
      MPV_TARGET_ARCH: ${{ matrix.arch }}
      VCPKG_TARGET_TRIPLET: ${{ matrix.vcpkg_triplet }}
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            deployment_target: "13.0"
            vcpkg_triplet: arm64-osx-mp
          - arch: x86_64
            deployment_target: "13.0"
            vcpkg_triplet: x64-osx-mp
    steps:
      - uses: actions/checkout@v6

      - name: Show build environment
        run: |
          xcodebuild -version
          uname -m
          echo "MACOSX_DEPLOYMENT_TARGET=$MACOSX_DEPLOYMENT_TARGET"
          echo "MPV_TARGET_ARCH=$MPV_TARGET_ARCH"
          echo "VCPKG_TARGET_TRIPLET=$VCPKG_TARGET_TRIPLET"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          set -euo pipefail
          python3 --version
          python3 -m pip install --upgrade pip
          python3 -m pip install meson ninja
          FORMULAE=(pkgconf autoconf autoconf-archive automake libtool nasm)
          MISSING=()
          for f in "${FORMULAE[@]}"; do
            if ! brew list --formula "$f" >/dev/null 2>&1; then
              MISSING+=("$f")
            fi
          done
          if [ "${#MISSING[@]}" -gt 0 ]; then
            brew update
            brew install -q "${MISSING[@]}"
          fi

      - name: Preflight tool checks
        run: |
          set -euo pipefail
          for tool in nasm pkg-config meson ninja; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "Missing required tool: $tool" >&2
              exit 1
            fi
          done
          nasm -v | head -n 1 || true
          pkg-config --version
          meson --version
          ninja --version

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            vcpkg_installed
            ~/Library/Caches/vcpkg/archives
          key: ${{ runner.os }}-${{ matrix.vcpkg_triplet }}-vcpkg-${{ hashFiles('install-vcpkg-deps.sh', 'vcpkg-triplets/*.cmake', 'vcpkg-ports/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.vcpkg_triplet }}-vcpkg-

      - name: Bootstrap vcpkg
        run: |
          set -euo pipefail
          if [ ! -d "$VCPKG_ROOT/.git" ]; then
            rm -rf "$VCPKG_ROOT"
            git clone --depth 1 https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          fi
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Install vcpkg dependencies
        run: bash ./install-vcpkg-deps.sh

      - name: Download mpv source code
        run: bash ./download.sh

      - name: Build mpv library
        run: bash ./build-macos.sh

      - name: Prepare artifacts
        env:
          MPV_TARGET_ARCH: ${{ matrix.arch }}
          VCPKG_TARGET_TRIPLET: ${{ matrix.vcpkg_triplet }}
          VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
        run: |
          set -euo pipefail
          REF_SAFE="${GITHUB_REF_NAME//\//-}"
          MPV_TAG="$REF_SAFE"
          RELEASE_REV="dev"
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-r([0-9]+)$ ]]; then
            MPV_TAG="${BASH_REMATCH[1]}"
            RELEASE_REV="r${BASH_REMATCH[2]}"
          elif [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            MPV_TAG="${BASH_REMATCH[1]}"
            RELEASE_REV="r0"
          fi
          PKG_NAME="libmpv-${MPV_TAG}-${RELEASE_REV}-macos-${{ matrix.arch }}"
          bash ./package-macos-runtime.sh \
            --build-dir "$GITHUB_WORKSPACE/vendor/mpv/buildout" \
            --out-dir "$GITHUB_WORKSPACE/release" \
            --pkg-name "$PKG_NAME"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-macos-${{ github.run_id }}-${{ matrix.arch }}
          path: |
            libmpv-*.tar.gz
            libmpv-*.tar.gz.sha256

  linux-build:
    name: Build libmpv (${{ matrix.runner }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v6

      - name: Install apt dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git curl python3 meson ninja-build pkg-config patchelf \
            libfreetype-dev libfribidi-dev liblcms2-dev libluajit-5.1-dev \
            libass-dev libavcodec-dev libavdevice-dev libavfilter-dev libavformat-dev libavutil-dev \
            libswresample-dev libswscale-dev \
            libpipewire-0.3-dev libpulse-dev \
            libxss-dev libxpresent-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libarchive-dev libbluray-dev libcdio-paranoia-dev libdvdnav-dev \
            librubberband-dev libzimg-dev libplacebo-dev libvulkan-dev

      - name: Show build environment
        run: |
          set -euo pipefail
          uname -a
          gcc --version
          meson --version
          pkg-config --version

      - name: Download mpv source code
        run: bash ./download.sh

      - name: Build mpv library
        run: bash ./build-linux.sh

      - name: Prepare artifacts
        run: |
          set -euo pipefail
          REF_SAFE="${GITHUB_REF_NAME//\//-}"
          MPV_TAG="$REF_SAFE"
          RELEASE_REV="dev"
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-r([0-9]+)$ ]]; then
            MPV_TAG="${BASH_REMATCH[1]}"
            RELEASE_REV="r${BASH_REMATCH[2]}"
          elif [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            MPV_TAG="${BASH_REMATCH[1]}"
            RELEASE_REV="r0"
          fi
          PKG_NAME="libmpv-${MPV_TAG}-${RELEASE_REV}-linux-${{ matrix.arch }}"
          bash ./package-linux-runtime.sh \
            --build-dir "$GITHUB_WORKSPACE/vendor/mpv/buildout" \
            --out-dir "$GITHUB_WORKSPACE/release" \
            --pkg-name "$PKG_NAME"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-linux-${{ github.run_id }}-${{ matrix.arch }}
          path: |
            libmpv-*.tar.gz
            libmpv-*.tar.gz.sha256

  msvc-build:
    name: Build libmpv (windows-2022 / msvc)
    runs-on: windows-2022
    env:
      VCPKG_TARGET_TRIPLET: x64-windows-mp
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install meson ninja
          meson --version
          ninja --version

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Bootstrap vcpkg repo
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: |
          if (-not (Test-Path "$env:VCPKG_ROOT/.git")) {
            if (Test-Path "$env:VCPKG_ROOT") { Remove-Item -Recurse -Force "$env:VCPKG_ROOT" }
            git clone --depth 1 https://github.com/microsoft/vcpkg.git "$env:VCPKG_ROOT"
          }

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        with:
          path: |
            vcpkg_installed
            vcpkg/downloads
            ~\AppData\Local\vcpkg\archives
          key: ${{ runner.os }}-${{ env.VCPKG_TARGET_TRIPLET }}-vcpkg-${{ hashFiles('install-vcpkg-deps-msvc.ps1', 'vcpkg-triplets/*.cmake', 'vcpkg-ports/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.VCPKG_TARGET_TRIPLET }}-vcpkg-

      - name: Install vcpkg dependencies (MSVC)
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: ./install-vcpkg-deps-msvc.ps1

      - name: Download mpv source code
        shell: bash
        run: bash ./download.sh

      - name: Build mpv library (MSVC)
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: ./build-msvc.ps1

      - name: Dump detect_compiler logs on failure
        if: failure()
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: |
          $a = "$env:VCPKG_ROOT/buildtrees/detect_compiler/stdout-x64-windows-mp.log"
          $b = "$env:VCPKG_ROOT/buildtrees/detect_compiler/config-x64-windows-mp-out.log"
          if (Test-Path $a) { Write-Host "===== $a ====="; Get-Content $a -Raw }
          if (Test-Path $b) { Write-Host "===== $b ====="; Get-Content $b -Raw }

      - name: Prepare artifacts
        shell: pwsh
        run: |
          $refSafe = "${{ github.ref_name }}" -replace '/', '-'
          $mpvTag = $refSafe
          $releaseRev = 'dev'
          if ("${{ github.ref_type }}" -eq 'tag' -and "${{ github.ref_name }}" -match '^v([0-9]+\.[0-9]+\.[0-9]+)-r([0-9]+)$') {
            $mpvTag = $Matches[1]
            $releaseRev = "r$($Matches[2])"
          } elseif ("${{ github.ref_type }}" -eq 'tag' -and "${{ github.ref_name }}" -match '^v([0-9]+\.[0-9]+\.[0-9]+)$') {
            $mpvTag = $Matches[1]
            $releaseRev = 'r0'
          }

          $pkgName = "libmpv-$mpvTag-$releaseRev-windows-msvc-x86_64"
          $buildDir = Join-Path $env:GITHUB_WORKSPACE 'vendor/mpv/build-msvc'
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE 'release'
          $stageDir = Join-Path $env:RUNNER_TEMP 'libmpv-msvc-stage'

          Remove-Item -Recurse -Force $stageDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          Copy-Item "$buildDir/libmpv*.dll" $stageDir -ErrorAction SilentlyContinue
          Copy-Item "$buildDir/libmpv*.lib" $stageDir -ErrorAction SilentlyContinue
          Copy-Item "$buildDir/libmpv*.pdb" $stageDir -ErrorAction SilentlyContinue

          $vcpkgBinDir = Join-Path $env:VCPKG_INSTALLED_DIR "$env:VCPKG_TARGET_TRIPLET/bin"
          if (Test-Path $vcpkgBinDir) {
            Copy-Item "$vcpkgBinDir/*.dll" $stageDir -ErrorAction SilentlyContinue
          }

          if (-not (Get-ChildItem $stageDir -Filter 'libmpv*.dll' -ErrorAction SilentlyContinue)) {
            throw "No libmpv*.dll found in $buildDir"
          }

          $zipPath = Join-Path $releaseDir "$pkgName.zip"
          if (Test-Path $zipPath) { Remove-Item -Force $zipPath }
          Compress-Archive -Path "$stageDir/*" -DestinationPath $zipPath

          $hash = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $(Split-Path -Leaf $zipPath)" | Out-File -FilePath "$zipPath.sha256" -Encoding ascii

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-msvc-${{ github.run_id }}-x86_64
          path: |
            release/*.zip
            release/*.zip.sha256

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [macos-build, linux-build, msvc-build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.tar.gz
            release-assets/**/*.tar.gz.sha256
            release-assets/**/*.zip
            release-assets/**/*.zip.sha256
          generate_release_notes: true
