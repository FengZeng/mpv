name: Build libmpv

on:
  pull_request:
  push:
    branches: [main, vcpkg]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: libmpv-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-build:
    name: Build libmpv (macos-15 / ${{ matrix.arch }})
    runs-on: macos-15
    env:
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
      MPV_TARGET_ARCH: ${{ matrix.arch }}
      VCPKG_TARGET_TRIPLET: ${{ matrix.vcpkg_triplet }}
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
      VCPKG_FORCE_SYSTEM_BINARIES: 1
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            deployment_target: "13.0"
            vcpkg_triplet: arm64-osx-mp
          - arch: x86_64
            deployment_target: "13.0"
            vcpkg_triplet: x64-osx-mp
    steps:
      - uses: actions/checkout@v6

      - name: Show build environment
        run: |
          xcodebuild -version
          uname -m
          echo "MACOSX_DEPLOYMENT_TARGET=$MACOSX_DEPLOYMENT_TARGET"
          echo "MPV_TARGET_ARCH=$MPV_TARGET_ARCH"
          echo "VCPKG_TARGET_TRIPLET=$VCPKG_TARGET_TRIPLET"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          set -euo pipefail
          python3 --version
          python3 -m pip install --upgrade pip
          python3 -m pip install meson ninja
          FORMULAE=(pkgconf autoconf autoconf-archive automake libtool nasm)
          MISSING=()
          for f in "${FORMULAE[@]}"; do
            if ! brew list --formula "$f" >/dev/null 2>&1; then
              MISSING+=("$f")
            fi
          done
          if [ "${#MISSING[@]}" -gt 0 ]; then
            brew update
            brew install -q "${MISSING[@]}"
          fi

      - name: Preflight tool checks
        run: |
          set -euo pipefail
          for tool in nasm pkg-config meson ninja; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "Missing required tool: $tool" >&2
              exit 1
            fi
          done
          nasm -v | head -n 1 || true
          pkg-config --version
          meson --version
          ninja --version

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            vcpkg_installed
            ~/Library/Caches/vcpkg/archives
          key: ${{ runner.os }}-${{ matrix.vcpkg_triplet }}-vcpkg-${{ hashFiles('bootstrap-vcpkg.sh', 'install-vcpkg-deps.sh', 'vcpkg-triplets/*.cmake', 'vcpkg-ports/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.vcpkg_triplet }}-vcpkg-

      - name: Bootstrap vcpkg
        run: bash ./bootstrap-vcpkg.sh

      - name: Install vcpkg dependencies
        env:
          VCPKG_SKIP_BOOTSTRAP: 1
        run: bash ./install-vcpkg-deps.sh

      - name: Download mpv source code
        run: bash ./download.sh

      - name: Build mpv library
        run: bash ./build-macos.sh

      - name: Prepare artifacts
        env:
          MPV_TARGET_ARCH: ${{ matrix.arch }}
          VCPKG_TARGET_TRIPLET: ${{ matrix.vcpkg_triplet }}
          VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
        run: |
          set -euo pipefail
          REF_SAFE="${GITHUB_REF_NAME//\//-}"
          MPV_TAG="$REF_SAFE"
          RELEASE_REV="dev"
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-r([0-9]+)$ ]]; then
            MPV_TAG="${BASH_REMATCH[1]}"
            RELEASE_REV="r${BASH_REMATCH[2]}"
          elif [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            MPV_TAG="${BASH_REMATCH[1]}"
            RELEASE_REV="r0"
          fi
          PKG_NAME="libmpv-${MPV_TAG}-${RELEASE_REV}-macos-${{ matrix.arch }}"
          bash ./package-macos-runtime.sh \
            --build-dir "$GITHUB_WORKSPACE/vendor/mpv/buildout" \
            --out-dir "$GITHUB_WORKSPACE/release" \
            --pkg-name "$PKG_NAME"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-macos-${{ github.run_id }}-${{ matrix.arch }}
          path: |
            libmpv-*.tar.gz
            libmpv-*.tar.gz.sha256

  linux-build:
    name: Build libmpv (${{ matrix.runner }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v6

      - name: Install apt dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git curl python3 meson ninja-build pkg-config patchelf nasm \
            libfreetype-dev libfribidi-dev liblcms2-dev libluajit-5.1-dev \
            libass-dev libopus-dev librubberband-dev \
            zlib1g-dev libbz2-dev liblzma-dev \
            libpipewire-0.3-dev libpulse-dev \
            libxss-dev libxpresent-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libarchive-dev libbluray-dev libcdio-paranoia-dev libdvdnav-dev \
            libzimg-dev libplacebo-dev libvulkan-dev

      - name: Install Meson
        run: |
          set -euo pipefail
          bash ./ensure-meson.sh
          echo "$GITHUB_WORKSPACE/vendor/meson-bin" >> "$GITHUB_PATH"

      - name: Show build environment
        run: |
          set -euo pipefail
          uname -a
          gcc --version
          meson --version
          pkg-config --version

      - name: Download mpv source code
        run: bash ./download.sh

      - name: Build FFmpeg from source
        run: bash ./build-ffmpeg.sh

      - name: Build mpv library
        run: bash ./build-linux.sh

      - name: Prepare artifacts
        run: |
          set -euo pipefail
          REF_SAFE="${GITHUB_REF_NAME//\//-}"
          MPV_TAG="$REF_SAFE"
          RELEASE_REV="dev"
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-r([0-9]+)$ ]]; then
            MPV_TAG="${BASH_REMATCH[1]}"
            RELEASE_REV="r${BASH_REMATCH[2]}"
          elif [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            MPV_TAG="${BASH_REMATCH[1]}"
            RELEASE_REV="r0"
          fi
          PKG_NAME="libmpv-${MPV_TAG}-${RELEASE_REV}-linux-${{ matrix.arch }}"
          bash ./package-linux-runtime.sh \
            --build-dir "$GITHUB_WORKSPACE/vendor/mpv/buildout" \
            --out-dir "$GITHUB_WORKSPACE/release" \
            --pkg-name "$PKG_NAME"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-linux-${{ github.run_id }}-${{ matrix.arch }}
          path: |
            libmpv-*.tar.gz
            libmpv-*.tar.gz.sha256

  mingw64-build:
    name: Build libmpv (${{ matrix.runner }} / ${{ matrix.msystem }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: windows-2022
            msystem: MINGW64
            mingw_prefix: /mingw64
            pkg_prefix: mingw-w64-x86_64
            ffmpeg_arch: x86_64
            ffmpeg_cc: gcc
            ffmpeg_cxx: g++
            ffmpeg_build_name: mingw64
            package_suffix: mingw64-x86_64
          - arch: arm64
            runner: windows-11-arm
            msystem: CLANGARM64
            mingw_prefix: /clangarm64
            pkg_prefix: mingw-w64-clang-aarch64
            ffmpeg_arch: aarch64
            ffmpeg_cc: clang
            ffmpeg_cxx: clang++
            ffmpeg_build_name: clangarm64
            package_suffix: clangarm64-arm64
    env:
      MINGW_PREFIX: ${{ matrix.mingw_prefix }}
      FFMPEG_ARCH: ${{ matrix.ffmpeg_arch }}
      FFMPEG_CC: ${{ matrix.ffmpeg_cc }}
      FFMPEG_CXX: ${{ matrix.ffmpeg_cxx }}
      FFMPEG_BUILD_NAME: ${{ matrix.ffmpeg_build_name }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup MSYS2 (${{ matrix.msystem }})
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            base-devel
            git
            ${{ matrix.pkg_prefix }}-toolchain
            ${{ matrix.pkg_prefix }}-meson
            ${{ matrix.pkg_prefix }}-ninja
            ${{ matrix.pkg_prefix }}-pkgconf
            ${{ matrix.pkg_prefix }}-python
            ${{ matrix.pkg_prefix }}-bzip2
            ${{ matrix.pkg_prefix }}-libass
            ${{ matrix.pkg_prefix }}-libjpeg-turbo
            ${{ matrix.pkg_prefix }}-luajit
            ${{ matrix.pkg_prefix }}-opus
            ${{ matrix.pkg_prefix }}-uchardet
            ${{ matrix.pkg_prefix }}-libplacebo
            ${{ matrix.pkg_prefix }}-libbluray
            ${{ matrix.pkg_prefix }}-libcdio-paranoia
            ${{ matrix.pkg_prefix }}-libdvdnav
            ${{ matrix.pkg_prefix }}-rubberband
            ${{ matrix.pkg_prefix }}-zimg
            ${{ matrix.pkg_prefix }}-zlib
            ${{ matrix.pkg_prefix }}-xz
            ${{ matrix.pkg_prefix }}-vulkan-loader
            ${{ matrix.pkg_prefix }}-vulkan-headers

      - name: Install x64 assembler
        if: ${{ matrix.arch == 'x86_64' }}
        shell: msys2 {0}
        run: pacman --noconfirm -S --needed mingw-w64-x86_64-nasm

      - name: Show build environment
        shell: msys2 {0}
        run: |
          set -euo pipefail
          uname -a
          cc --version || clang --version || gcc --version
          meson --version
          pkg-config --version

      - name: Download mpv source code
        shell: msys2 {0}
        run: bash ./download.sh

      - name: Build FFmpeg from source
        shell: msys2 {0}
        run: bash ./build-ffmpeg.sh

      - name: Build mpv library
        shell: msys2 {0}
        run: bash ./build-mingw64.sh

      - name: Prepare artifacts
        shell: msys2 {0}
        run: |
          set -euo pipefail
          REF_SAFE="${GITHUB_REF_NAME//\//-}"
          MPV_TAG="$REF_SAFE"
          RELEASE_REV="dev"
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-r([0-9]+)$ ]]; then
            MPV_TAG="${BASH_REMATCH[1]}"
            RELEASE_REV="r${BASH_REMATCH[2]}"
          elif [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            MPV_TAG="${BASH_REMATCH[1]}"
            RELEASE_REV="r0"
          fi
          PKG_NAME="libmpv-${MPV_TAG}-${RELEASE_REV}-windows-${{ matrix.package_suffix }}"
          bash ./package-mingw64-runtime.sh \
            --build-dir "$GITHUB_WORKSPACE/vendor/mpv/buildout" \
            --out-dir "$GITHUB_WORKSPACE/release" \
            --pkg-name "$PKG_NAME"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-${{ matrix.package_suffix }}-${{ github.run_id }}
          path: |
            libmpv-*.tar.gz
            libmpv-*.tar.gz.sha256

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [macos-build, linux-build, mingw64-build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.tar.gz
            release-assets/**/*.tar.gz.sha256
          generate_release_notes: true
