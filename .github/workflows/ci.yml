name: Build libmpv

on:
  pull_request:
  push:
    branches: [main, vcpkg]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: libmpv-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-build:
    name: Build libmpv (macos-15 / ${{ matrix.arch }})
    runs-on: macos-15
    env:
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
      MPV_TARGET_ARCH: ${{ matrix.arch }}
      VCPKG_TARGET_TRIPLET: ${{ matrix.vcpkg_triplet }}
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            deployment_target: "13.0"
            vcpkg_triplet: arm64-osx-mp
          - arch: x86_64
            deployment_target: "13.0"
            vcpkg_triplet: x64-osx-mp
    steps:
      - uses: actions/checkout@v6

      - name: Show build environment
        run: |
          xcodebuild -version
          uname -m
          echo "MACOSX_DEPLOYMENT_TARGET=$MACOSX_DEPLOYMENT_TARGET"
          echo "MPV_TARGET_ARCH=$MPV_TARGET_ARCH"
          echo "VCPKG_TARGET_TRIPLET=$VCPKG_TARGET_TRIPLET"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          set -euo pipefail
          python3 --version
          python3 -m pip install --upgrade pip
          python3 -m pip install meson ninja
          FORMULAE=(pkgconf autoconf autoconf-archive automake libtool nasm)
          MISSING=()
          for f in "${FORMULAE[@]}"; do
            if ! brew list --formula "$f" >/dev/null 2>&1; then
              MISSING+=("$f")
            fi
          done
          if [ "${#MISSING[@]}" -gt 0 ]; then
            brew update
            brew install -q "${MISSING[@]}"
          fi

      - name: Preflight tool checks
        run: |
          set -euo pipefail
          for tool in nasm pkg-config meson ninja; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "Missing required tool: $tool" >&2
              exit 1
            fi
          done
          nasm -v | head -n 1 || true
          pkg-config --version
          meson --version
          ninja --version

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            vcpkg_installed
            ~/Library/Caches/vcpkg/archives
          key: ${{ runner.os }}-${{ matrix.vcpkg_triplet }}-vcpkg-${{ hashFiles('install-vcpkg-deps.sh', 'vcpkg-triplets/*.cmake', 'vcpkg-ports/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.vcpkg_triplet }}-vcpkg-

      - name: Bootstrap vcpkg
        run: |
          set -euo pipefail
          if [ ! -d "$VCPKG_ROOT/.git" ]; then
            rm -rf "$VCPKG_ROOT"
            git clone --depth 1 https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          fi
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Install vcpkg dependencies
        run: bash ./install-vcpkg-deps.sh

      - name: Download mpv source code
        run: bash ./download.sh

      - name: Build mpv library
        run: bash ./build-macos.sh

      - name: Prepare artifacts
        env:
          MPV_TARGET_ARCH: ${{ matrix.arch }}
          VCPKG_TARGET_TRIPLET: ${{ matrix.vcpkg_triplet }}
          VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
        run: |
          set -euo pipefail
          REF_SAFE="${GITHUB_REF_NAME//\//-}"
          MPV_TAG="$REF_SAFE"
          RELEASE_REV="dev"
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-r([0-9]+)$ ]]; then
            MPV_TAG="${BASH_REMATCH[1]}"
            RELEASE_REV="r${BASH_REMATCH[2]}"
          elif [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            MPV_TAG="${BASH_REMATCH[1]}"
            RELEASE_REV="r0"
          fi
          PKG_NAME="libmpv-${MPV_TAG}-${RELEASE_REV}-macos-${{ matrix.arch }}"
          bash ./package-macos-runtime.sh \
            --build-dir "$GITHUB_WORKSPACE/vendor/mpv/buildout" \
            --out-dir "$GITHUB_WORKSPACE/release" \
            --pkg-name "$PKG_NAME"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-macos-${{ github.run_id }}-${{ matrix.arch }}
          path: |
            libmpv-*.tar.gz
            libmpv-*.tar.gz.sha256

  linux-build:
    name: Build libmpv (${{ matrix.runner }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v6

      - name: Install apt dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git curl python3 meson ninja-build pkg-config patchelf \
            libfreetype-dev libfribidi-dev liblcms2-dev libluajit-5.1-dev \
            libass-dev libavcodec-dev libavdevice-dev libavfilter-dev libavformat-dev libavutil-dev \
            libswresample-dev libswscale-dev \
            libpipewire-0.3-dev libpulse-dev \
            libxss-dev libxpresent-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libarchive-dev libbluray-dev libcdio-paranoia-dev libdvdnav-dev \
            librubberband-dev libzimg-dev libplacebo-dev libvulkan-dev

      - name: Show build environment
        run: |
          set -euo pipefail
          uname -a
          gcc --version
          meson --version
          pkg-config --version

      - name: Download mpv source code
        run: bash ./download.sh

      - name: Build mpv library
        run: bash ./build-linux.sh

      - name: Prepare artifacts
        run: |
          set -euo pipefail
          REF_SAFE="${GITHUB_REF_NAME//\//-}"
          MPV_TAG="$REF_SAFE"
          RELEASE_REV="dev"
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-r([0-9]+)$ ]]; then
            MPV_TAG="${BASH_REMATCH[1]}"
            RELEASE_REV="r${BASH_REMATCH[2]}"
          elif [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            MPV_TAG="${BASH_REMATCH[1]}"
            RELEASE_REV="r0"
          fi
          PKG_NAME="libmpv-${MPV_TAG}-${RELEASE_REV}-linux-${{ matrix.arch }}"
          bash ./package-linux-runtime.sh \
            --build-dir "$GITHUB_WORKSPACE/vendor/mpv/buildout" \
            --out-dir "$GITHUB_WORKSPACE/release" \
            --pkg-name "$PKG_NAME"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-linux-${{ github.run_id }}-${{ matrix.arch }}
          path: |
            libmpv-*.tar.gz
            libmpv-*.tar.gz.sha256

  windows-mingw-build:
    name: Build libmpv (ubuntu-24.04 / mingw-w64)
    runs-on: ubuntu-24.04
    env:
      VCPKG_TARGET_TRIPLET: x64-mingw-mp
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf autoconf-archive automake build-essential curl git libtool make \
            mingw-w64 gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 \
            nasm pkg-config zip
          python -m pip install --upgrade pip
          python -m pip install meson ninja
          meson --version
          ninja --version

      - name: Bootstrap vcpkg repo
        shell: bash
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: |
          if [ ! -d "$VCPKG_ROOT/.git" ]; then
            rm -rf "$VCPKG_ROOT"
            git clone --depth 1 https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          fi
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            vcpkg_installed
            vcpkg/downloads
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-${{ env.VCPKG_TARGET_TRIPLET }}-vcpkg-${{ hashFiles('install-vcpkg-deps.sh', 'install-vcpkg-deps-mingw.sh', 'vcpkg-triplets/*.cmake', 'vcpkg-ports/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.VCPKG_TARGET_TRIPLET }}-vcpkg-

      - name: Install vcpkg dependencies (MinGW-w64)
        shell: bash
        run: ./install-vcpkg-deps-mingw.sh

      - name: Download mpv source code
        shell: bash
        run: bash ./download.sh

      - name: Build mpv library (MinGW-w64)
        shell: bash
        run: ./build-mingw64.sh

      - name: Dump recent vcpkg logs on failure
        if: failure()
        shell: bash
        run: |
          if [ -d "$VCPKG_ROOT/buildtrees" ]; then
            find "$VCPKG_ROOT/buildtrees" -maxdepth 2 -type f \( -name '*.log' -o -name '*.txt' \) | sort | tail -n 20 | while read -r file; do
              echo "===== $file ====="
              sed -n '1,160p' "$file" || true
            done
          fi

      - name: Prepare artifacts
        shell: bash
        run: |
          ref_safe="${GITHUB_REF_NAME//\//-}"
          mpv_tag="$ref_safe"
          release_rev="dev"
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-r([0-9]+)$ ]]; then
            mpv_tag="${BASH_REMATCH[1]}"
            release_rev="r${BASH_REMATCH[2]}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            mpv_tag="${BASH_REMATCH[1]}"
            release_rev="r0"
          fi

          pkg_name="libmpv-${mpv_tag}-${release_rev}-windows-mingw-x86_64"
          build_dir="$GITHUB_WORKSPACE/vendor/mpv/build-mingw64"
          release_dir="$GITHUB_WORKSPACE/release"
          stage_dir="$RUNNER_TEMP/libmpv-mingw-stage"

          rm -rf "$stage_dir"
          mkdir -p "$stage_dir" "$release_dir"

          find "$build_dir" -maxdepth 1 -type f \( -name 'libmpv*.dll' -o -name 'libmpv*.dll.a' \) -exec cp {} "$stage_dir/" \;

          vcpkg_bin_dir="$VCPKG_INSTALLED_DIR/$VCPKG_TARGET_TRIPLET/bin"
          if [ -d "$vcpkg_bin_dir" ]; then
            find "$vcpkg_bin_dir" -maxdepth 1 -type f -name '*.dll' -exec cp {} "$stage_dir/" \;
          fi

          if ! find "$stage_dir" -maxdepth 1 -type f -name 'libmpv*.dll' | grep -q .; then
            echo "No libmpv*.dll found in $build_dir" >&2
            exit 1
          fi

          zip_path="$release_dir/$pkg_name.zip"
          rm -f "$zip_path" "$zip_path.sha256"
          (
            cd "$stage_dir"
            zip -9 -r "$zip_path" .
          )
          (
            cd "$release_dir"
            sha256sum "$(basename "$zip_path")" > "$(basename "$zip_path").sha256"
          )

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-windows-mingw-${{ github.run_id }}-x86_64
          path: |
            release/*.zip
            release/*.zip.sha256

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [macos-build, linux-build, windows-mingw-build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.tar.gz
            release-assets/**/*.tar.gz.sha256
            release-assets/**/*.zip
            release-assets/**/*.zip.sha256
          generate_release_notes: true
