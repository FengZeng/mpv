name: Build libmpv (Windows CI)

on:
  workflow_dispatch:
    inputs:
      run_windows:
        description: "Run Windows CI job"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: windows-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mingw64-build:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_windows }}
    name: Build libmpv (${{ matrix.runner }} / ${{ matrix.msystem }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: windows-2022
            msystem: MINGW64
            mingw_prefix: /mingw64
            pkg_prefix: mingw-w64-x86_64
            ffmpeg_arch: x86_64
            ffmpeg_cc: gcc
            ffmpeg_cxx: g++
            ffmpeg_build_name: mingw64
            package_suffix: mingw64-x86_64
          - arch: arm64
            runner: windows-11-arm
            msystem: CLANGARM64
            mingw_prefix: /clangarm64
            pkg_prefix: mingw-w64-clang-aarch64
            ffmpeg_arch: aarch64
            ffmpeg_cc: clang
            ffmpeg_cxx: clang++
            ffmpeg_build_name: clangarm64
            package_suffix: clangarm64-arm64
    env:
      MINGW_PREFIX: ${{ matrix.mingw_prefix }}
      FFMPEG_ARCH: ${{ matrix.ffmpeg_arch }}
      FFMPEG_CC: ${{ matrix.ffmpeg_cc }}
      FFMPEG_CXX: ${{ matrix.ffmpeg_cxx }}
      FFMPEG_BUILD_NAME: ${{ matrix.ffmpeg_build_name }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup MSYS2 (${{ matrix.msystem }})
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            base-devel
            git
            ${{ matrix.pkg_prefix }}-toolchain
            ${{ matrix.pkg_prefix }}-meson
            ${{ matrix.pkg_prefix }}-ninja
            ${{ matrix.pkg_prefix }}-pkgconf
            ${{ matrix.pkg_prefix }}-python
            ${{ matrix.pkg_prefix }}-bzip2
            ${{ matrix.pkg_prefix }}-libass
            ${{ matrix.pkg_prefix }}-libjpeg-turbo
            ${{ matrix.pkg_prefix }}-luajit
            ${{ matrix.pkg_prefix }}-opus
            ${{ matrix.pkg_prefix }}-uchardet
            ${{ matrix.pkg_prefix }}-libplacebo
            ${{ matrix.pkg_prefix }}-libbluray
            ${{ matrix.pkg_prefix }}-libcdio-paranoia
            ${{ matrix.pkg_prefix }}-libdvdnav
            ${{ matrix.pkg_prefix }}-rubberband
            ${{ matrix.pkg_prefix }}-zimg
            ${{ matrix.pkg_prefix }}-zlib
            ${{ matrix.pkg_prefix }}-xz
            ${{ matrix.pkg_prefix }}-vulkan-loader
            ${{ matrix.pkg_prefix }}-vulkan-headers

      - name: Install x64 assembler
        if: ${{ matrix.arch == 'x86_64' }}
        shell: msys2 {0}
        run: pacman --noconfirm -S --needed mingw-w64-x86_64-nasm

      - name: Show build environment
        shell: msys2 {0}
        run: |
          set -euo pipefail
          uname -a
          cc --version || clang --version || gcc --version
          meson --version
          pkg-config --version

      - name: Download mpv source code
        shell: msys2 {0}
        run: bash ./download.sh

      - name: Build FFmpeg from source
        shell: msys2 {0}
        run: bash ./build-ffmpeg.sh

      - name: Build mpv library
        shell: msys2 {0}
        run: bash ./build-mingw64.sh

      - name: Prepare artifacts
        shell: msys2 {0}
        run: |
          set -euo pipefail
          REF_SAFE="${GITHUB_REF_NAME//\//-}"
          MPV_TAG="$REF_SAFE"
          RELEASE_REV="dev"
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-r([0-9]+)$ ]]; then
            MPV_TAG="${BASH_REMATCH[1]}"
            RELEASE_REV="r${BASH_REMATCH[2]}"
          elif [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            MPV_TAG="${BASH_REMATCH[1]}"
            RELEASE_REV="r0"
          fi
          PKG_NAME="libmpv-${MPV_TAG}-${RELEASE_REV}-windows-${{ matrix.package_suffix }}"
          bash ./package-mingw64-runtime.sh \
            --build-dir "$GITHUB_WORKSPACE/vendor/mpv/buildout" \
            --out-dir "$GITHUB_WORKSPACE/release" \
            --pkg-name "$PKG_NAME"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-windows-ci-${{ github.run_id }}-${{ matrix.arch }}
          path: |
            libmpv-*.tar.gz
            libmpv-*.tar.gz.sha256
